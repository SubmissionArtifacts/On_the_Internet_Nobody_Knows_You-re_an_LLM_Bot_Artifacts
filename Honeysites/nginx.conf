worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    server_names_hash_bucket_size 128;
    
    upstream site1 {
        server nginx1:80;
    }

    upstream site2 {
        server nginx2:80;
    }

    upstream site3 {
        server nginx3:80;
    }

    upstream site4 {
        server nginx4:80;
    }

    upstream site5 {
        server nginx5:80;
    }

    upstream site6 {
        server nginx6:80;
    }

    upstream site7 {
        server nginx7:80;
    }

    upstream site9 {
        server nginx9:80;
    }

    upstream matomo {
        server matomo:80;
    }

    upstream backend {
        server actions-api:3005;
    }

    log_format kv 'site="$server_name" server="$host" dest_port="$server_port" dest_ip="$server_addr" '
                    'src="$remote_addr" src_ip="$realip_remote_addr" src_port="$realip_remote_port" user="$remote_user" '
                    'time_local="$time_local" timestamp="$msec" protocol="$server_protocol" ssl_protocol="$ssl_protocol" status="$status" '
                    'bytes_out="$bytes_sent" bytes_in="$upstream_bytes_received" '
                    'http_referer="$http_referer" http_user_agent="$http_user_agent" '
                    'nginx_version="$nginx_version" http_x_forwarded_for="$http_x_forwarded_for" '
                    'http_x_header="$http_x_header" uri_query="$query_string" uri_path="$uri" '
                    'http_method="$request_method" response_time="$upstream_response_time" '
                    'tls_cipher="$ssl_cipher" tls_ciphers="$ssl_ciphers" '
                    'cookie="$http_cookie" request_time="$request_time" category="$sent_http_content_type" https="$https"'
                    'SSL_session_reused="$ssl_session_reused" SSL_session_ID="$ssl_session_id" SSL_early_data="$ssl_early_data" '
                    'SSL_curves="$ssl_curves" SSL_curve="$ssl_curve" SSL_alpn_protocol="$ssl_alpn_protocol" '
                    'X-Blocked="$sent_http_x_blocked" X-Verified="$sent_http_x_verified"';

    access_log /var/log/nginx/access.log kv;
    error_log  /var/log/nginx/error.log debug;
    
    server {
        listen 80;
        server_name example.org www.example.org;
        # Allow large payloads
        client_max_body_size 10M;

        location /.well-known/acme-challenge/ {
            allow all;
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }

    }

    server {
        listen 443 ssl;
        listen 443 quic reuseport;

        server_name example.org www.example.org;

        ssl_certificate /etc/letsencrypt/live/example.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/example.org/privkey.pem;

        
        ssl_trusted_certificate /etc/letsencrypt/live/example.org/chain.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Optional: Improve QUIC compatibility
        ssl_session_cache off;

        # Advertise HTTP/3 support to clients
        add_header Alt-Svc 'h3=":443"'; 

        # Allow large payloads
        client_max_body_size 10M;
        
        # ✅ IMPORTANT: root/index at SERVER level so PHP location gets it too
        root /var/www/html;
        index index.php index.html;

        location / {
            #root /usr/share/nginx/html;
            #index index.html;

            # Try to serve index.php
            try_files $uri $uri/ /index.php?$query_string;
            
            proxy_redirect off;
            proxy_pass_request_headers on;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Cookie $http_cookie;

            # Force last modified to be new 
            if_modified_since  off;
            add_header  Last-Modified  "";
        }

        # add location for php files 
        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            
            # Pass original client info to PHP
            fastcgi_param HTTP_X_REAL_IP        $remote_addr;
            fastcgi_param HTTP_X_FORWARDED_FOR  $proxy_add_x_forwarded_for;
            fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;

            
            fastcgi_param REMOTE_ADDR $remote_addr;
            
            fastcgi_pass php-main:9000;
        }
    }

    server {
        listen 443 ssl;
        server_name site1.example.org;

        ssl_certificate /etc/letsencrypt/live/example.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/example.org/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Listen to quic 
        listen 443 quic;
        # Advertise HTTP/3 support to clients
        add_header Alt-Svc 'h3=":443"'; 

        location / {
            proxy_pass http://site1/;
            proxy_redirect off;
            proxy_pass_request_headers on;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Force last modified to be new 
            if_modified_since  off;
            add_header  Last-Modified  "";
        }
    }

